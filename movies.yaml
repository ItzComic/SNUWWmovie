# Lore entries (expand as needed)
lore:
  origin: |
    Whitewater has always harbored darkness beneath its suburban facade. In the 1930s, 
    the town earned a sinister reputation as the "Second Salem"—a place where strange 
    accidents befell outsiders and whispers of occult activity lingered in the Miller family estates.

  phantom: |
    Reported sightings began in 2018. Witnesses describe a figure moving with inhuman speed 
    along the local trails, particularly near Starin Park and the Miller Memorial Grounds. 
    The entity does not appear in daylight. The figure's features remain obscured, though 
    accounts mention "white cloth" and "an absence where the eyes should be."

  pattern: |
    Incidents cluster around autumn equinox and summer solstice. Campus security reports 
    an uptick in student disappearances during these periods. The common factor: all missing 
    students were last seen near the trails. All exhibit signs of acute psychological distress 
    before vanishing.

# Timeline (for easy modification)
timeline:
  - year: "1933"
    event: "The Miller Disappearance"
    description: "Three children vanish from Miller Estate. Found days later in Whitewater Woods with no memory of lost time. One child never fully recovered speech."

  - year: "1978"
    event: "Campus Reports Begin"
    description: "First official report to Whitewater PD of a 'tall figure' seen near campus perimeter at dusk."

  - year: "2018-Present"
    event: "Active Sightings"
    description: "The Phantom reappears with increased frequency. Campus Police document 47 reports. 9 students remain missing."

  - year: "ONGOING"
    event: "Investigation Status: ACTIVE"
    description: "All witnesses restricted from discussing details. Archive access limited to authorized personnel only."
